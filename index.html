<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juegos Aurora | Dashboard</title>
  <link rel="icon" href="data:," />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-animation">
    <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
    <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
  </div>
  <div class="stars" id="global-stars"></div>

  <div id="main-menu" class="main-menu">
    <h1 class="menu-title">Juegos Aurora<br><span style="font-size:1.3rem;color:#a0a0a0;">Dashboard</span></h1>
    <div class="games-grid">
      <a class="game-card" href="./ahorcado.html" style="text-decoration:none;color:inherit;">
        <span class="emoji">🎪</span><h3>Ahorcado Mágico</h3><p>Juego individual</p>
      </a>
      <a class="game-card" href="./aventura_alfabeto_2.html" style="text-decoration:none;color:inherit;">
        <span class="emoji">🌈</span><h3>Aventura del Alfabeto</h3><p>Página individual</p>
      </a>
      <a class="game-card" href="./lluvia.html" style="text-decoration:none;color:inherit;">
        <span class="emoji">☔</span><h3>Lluvia de Letras</h3><p>Juego individual</p>
      </a>
      <a class="game-card" href="./palabras.html" style="text-decoration:none;color:inherit;">
        <span class="emoji">🧩</span><h3>Palabras Escondidas</h3><p>Juego individual</p>
      </a>
    </div>
  </div>

  <script>
    (function createStars(){
      const container = document.getElementById('global-stars');
      for (let i=0;i<50;i++) {
        const star = document.createElement('div');
        star.className='star';
        star.style.left = Math.random()*100+'%';
        star.style.top = Math.random()*100+'%';
        star.style.animationDelay = Math.random()*2+'s';
        star.style.width = star.style.height = (Math.random()*3+2)+'px';
        container.appendChild(star);
      }
    })();
  </script>
</body>
</html>
