<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="icon" href="data:,">
    <title>Juegos Aurora ✨ Edición Mágica</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(145deg, #0a0f2a 0%, #0a0a2a 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animaciones mágicas */
        @keyframes floatMagic {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-20px) rotate(5deg); }
        }
        @keyframes sparkle {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        @keyframes shakeBack {
            0% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
            100% { transform: translateX(0); }
        }
        @keyframes glitterPulse {
            0% { text-shadow: 0 0 0px gold; }
            50% { text-shadow: 0 0 20px gold, 0 0 5px orange; }
            100% { text-shadow: 0 0 0px gold; }
        }
        @keyframes bounceWin {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes rainGlow {
            0% { box-shadow: 0 0 0px cyan; }
            100% { box-shadow: 0 0 20px cyan, 0 0 40px #00ffff; }
        }

        .game-container {
            max-width: 1100px;
            margin: 20px auto;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border-radius: 60px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .header h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #FFEaa7, #FF6B9D, #A29BFE);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px rgba(255,107,157,0.5);
        }

        /* Premios mágicos */
        .pe-prize-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 15px 0;
            justify-content: center;
        }
        .pe-prize-item {
            background: linear-gradient(135deg, #FFEaa7, #FF9F43);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            color: #2d3436;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            animation: glowPulse 1.5s infinite;
        }
        @keyframes glowPulse {
            0% { box-shadow: 0 0 0px gold; transform: scale(1); }
            50% { box-shadow: 0 0 20px gold, 0 0 5px orange; transform: scale(1.05); }
            100% { box-shadow: 0 0 0px gold; transform: scale(1); }
        }

        /* Letras que vuelven a su sitio (corrección animada) */
        .pe-letter-btn {
            background: linear-gradient(135deg, #6C5CE7, #a29bfe);
            border: none;
            width: 70px;
            height: 70px;
            border-radius: 30px;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 0 #3d2c8f;
            margin: 8px;
        }
        .pe-letter-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #3d2c8f;
        }
        .pe-letter-btn.hidden {
            visibility: hidden;
            pointer-events: none;
            opacity: 0;
        }
        .error-shake {
            animation: shakeBack 0.4s ease-in-out !important;
            background: #e74c3c !important;
        }
        .magic-spark {
            position: fixed;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, gold, orange);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            animation: sparkle 0.6s ease-out forwards;
        }
        .level-up-magic {
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            font-weight: bold;
            white-space: nowrap;
            background: linear-gradient(45deg, gold, #ff6b9d, #a29bfe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px cyan;
            z-index: 10000;
            animation: bounceWin 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
            pointer-events: none;
        }
        .prize-celebrate {
            animation: glitterPulse 0.5s ease-out;
        }
        .congrats-firework {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9998;
            background: radial-gradient(circle, transparent, rgba(0,0,0,0.3));
            animation: fadeOut 1s forwards;
        }
        @keyframes fadeOut {
            to { opacity: 0; }
        }
        .win-overlay-premium {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            border-radius: 70px;
            border: 2px solid gold;
            animation: bounceWin 0.5s;
        }
        .pe-slot {
            display: inline-flex;
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.2);
            border-radius: 25px;
            margin: 5px;
            font-size: 2.5rem;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: 0.1s;
            border: 2px solid rgba(255,215,0,0.5);
        }
        .pe-slot.filled {
            background: linear-gradient(145deg, #00b894, #55efc4);
            color: #2d3436;
            box-shadow: 0 0 15px #00ffcc;
        }
        .result-overlay {
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 40px;
        }
        button {
            font-family: 'Nunito', sans-serif;
            font-weight: bold;
        }
        .collection-item {
            transition: transform 0.2s;
        }
        .collection-item.unlocked {
            filter: drop-shadow(0 0 8px gold);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
<div id="main-menu" class="main-menu" style="display: none;">...</div>
<button id="mainBackBtn" class="back-btn" onclick="window.location.href='index.html'" style="display:block;">🏠 Volver al Menú</button>

<div id="palabras-app" style="display: block;">
    <div class="game-container">
        <div class="header">
            <h1>🧩 Palabras Escondidas ✨</h1>
            <p class="subtitle" id="pe_subtitle">Ordena las letras con magia</p>
            <div class="lang-selector" id="pe_langSelector">
                <button class="lang-btn active" data-lang="es" onclick="gc_setLangAndRefresh('es')">🇪🇸 Español</button>
                <button class="lang-btn" data-lang="en" onclick="gc_setLangAndRefresh('en')">🇺🇸 English</button>
            </div>
        </div>
        <div class="score-board">
            <div class="score-item"><span class="icon">⭐</span><div><div class="label">Puntos</div><div class="value" id="pe_score">0</div></div></div>
            <div class="score-item"><span class="icon">🎯</span><div><div class="label">Nivel</div><div class="value" id="pe_level">1</div></div></div>
        </div>
        <div style="text-align:center; margin: 6px 0 12px;">
            <button class="restart-btn" id="pe_resetBtn" onclick="pe_restartFromLevelOne()" style="padding:8px 16px;">✨ Reiniciar magia ✨</button>
        </div>
        <div class="game-area">
            <div class="word-display">
                <div class="hint" id="pe_hint" style="font-size: 4rem; margin-bottom: 20px;">🚗</div>
                <div class="pe-word-area" id="pe_wordSlots"></div>
            </div>
            <div class="pe-letters-area" id="pe_lettersArea" style="display: flex; flex-wrap: wrap; justify-content: center; margin-top: 20px;"></div>
        </div>
        <div class="pe-prizes">
            <h3>🎁 Premios Mágicos Conseguidos 🎁</h3>
            <div class="pe-prize-list" id="pe_prizeList"></div>
        </div>
        <div class="collection-panel">
            <h3>🌟 Colección de Recompensas Místicas 🌟</h3>
            <div class="collection-grid" id="pe_collectionGrid" style="display: flex; flex-wrap: wrap; gap: 15px; justify-content: center;"></div>
        </div>
    </div>
    <div class="result-overlay" id="pe_winOverlay" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; text-align: center;">
        <div class="emoji" id="pe_winEmoji" style="font-size: 5rem;">🏆✨</div>
        <h2 id="pe_winTitle">¡MAGIA PURA!</h2>
        <p class="word-reveal" id="pe_prizeMsg">🎉 ¡Ganaste un premio brillante! 🎉</p>
        <button class="restart-btn" onclick="pe_nextWord()">✨ Siguiente Palabra Mágica ✨</button>
    </div>
</div>

<script>
    // ==================== CORAZÓN DE JUEGO MEJORADO ====================
    const gameCore = {
        player: { score: 0, level: 1, lives: 3, rewards: [], wordsLearned: [] },
        settings: { language: 'es' },
        rewardCatalog: [
            { id: 'estrella_oro', nombre: '✨ Estrella Dorada', icono: '⭐' },
            { id: 'unicornio_plateado', nombre: '🦄 Unicornio Plateado', icono: '🦄' },
            { id: 'arcoiris_magico', nombre: '🌈 Arcoíris Mágico', icono: '🌈' },
            { id: 'corazon_luminoso', nombre: '💖 Corazón Luminoso', icono: '💖' }
        ],
        unlockReward(id) { if (!this.player.rewards.includes(id)) { this.player.rewards.push(id); this.saveGame(); return true; } return false; },
        addScore(p) { this.player.score += p; this.saveGame(); },
        loseLife() { this.player.lives = Math.max(0, this.player.lives - 1); this.saveGame(); },
        gainLife() { this.player.lives = Math.min(5, this.player.lives + 1); this.saveGame(); },
        registerLetterResult(l, ok) { if (ok) this.addScore(10); else this.loseLife(); },
        registerWordResult(w, ok) { if (ok) this.addScore(50); this.saveGame(); },
        canUseWord(w) { return true; },
        saveGame() { localStorage.setItem('magicWordsSave', JSON.stringify(this.player)); },
        loadGame() { const d = localStorage.getItem('magicWordsSave'); if(d) { const p = JSON.parse(d); this.player = { ...this.player, ...p }; } }
    };
    gameCore.loadGame();
    if(gameCore.player.rewards.length === 0) gameCore.player.rewards = ['estrella_oro'];

    function t(key) { return key === 'points' ? (gameCore.settings.language === 'es' ? 'Puntos' : 'Points') : (key === 'collection_title' ? 'Colección Mágica' : 'Premios'); }
    function gc_setLangAndRefresh(lang) { gameCore.settings.language = lang; document.querySelectorAll('#pe_langSelector .lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang)); gc_refreshHeaderLabels(); pe_renderCollection(); pe_updatePrizes(); pe_nextWord(); }
    function gc_refreshHeaderLabels() { 
        document.querySelectorAll('#palabras-app .label').forEach(el => { if(el.textContent.includes('Puntos')) el.textContent = t('points'); });
        document.getElementById('pe_subtitle').textContent = gameCore.settings.language === 'en' ? 'Order the letters' : 'Ordena las letras';
    }

    // Variables mejoradas
    let pe_state = { currentWord: '', letters: [], slots: [], errorTimeout: null };

    // Obtener palabras desde ahorcado
    function pe_getWordsFromAhorcado() {
        const lang = gameCore.settings.language;
        const wordsDB = {
            animals: { es: [{ word: 'GATO', emoji: '🐱' }, { word: 'PERRO', emoji: '🐶' }, { word: 'MARIPOSA', emoji: '🦋' }, { word: 'ELEFANTE', emoji: '🐘' }],
                       en: [{ word: 'CAT', emoji: '🐱' }, { word: 'DOG', emoji: '🐶' }, { word: 'BUTTERFLY', emoji: '🦋' }, { word: 'ELEPHANT', emoji: '🐘' }] },
            family: { es: [{ word: 'MAMA', emoji: '👩' }, { word: 'HERMANO', emoji: '👦' }, { word: 'ABUELA', emoji: '👵' }],
                      en: [{ word: 'MOM', emoji: '👩' }, { word: 'BROTHER', emoji: '👦' }, { word: 'GRANDMA', emoji: '👵' }] },
            colors: { es: [{ word: 'ROJO', emoji: '🔴' }, { word: 'AZUL', emoji: '🔵' }, { word: 'VERDE', emoji: '🟢' }],
                      en: [{ word: 'RED', emoji: '🔴' }, { word: 'BLUE', emoji: '🔵' }, { word: 'GREEN', emoji: '🟢' }] }
        };
        let pool = [];
        Object.values(wordsDB).forEach(cat => { if(cat[lang]) pool.push(...cat[lang]); });
        return pool.map(p => ({ w: p.word.toUpperCase(), e: p.emoji }));
    }

    function pe_restartFromLevelOne() { gameCore.player.level = 1; gameCore.player.score = 0; gameCore.player.lives = 3; gameCore.saveGame(); pe_startGame(); }
    function pe_startGame() { pe_state = { currentWord: '', letters: [], slots: [] }; pe_updatePrizes(); pe_renderCollection(); gc_refreshHeaderLabels(); pe_nextWord(); }

    // Efecto de partículas mágicas
    function createMagicSpark(x, y) { for(let i=0;i<12;i++){ let sp=document.createElement('div'); sp.className='magic-spark'; sp.style.left=(x + (Math.random()-0.5)*30)+'px'; sp.style.top=(y + (Math.random()-0.5)*30)+'px'; sp.style.animationDuration=(0.4+Math.random()*0.6)+'s'; document.body.appendChild(sp); setTimeout(()=>sp.remove(),600); } }
    function showLevelUpMagic() { const div=document.createElement('div'); div.className='level-up-magic'; div.textContent=`✨ ¡NIVEL ${gameCore.player.level+1}! ✨`; document.body.appendChild(div); setTimeout(()=>div.remove(),1500); createConfettiExplosion(); }
    function createConfettiExplosion() { for(let i=0;i<60;i++){ let conf=document.createElement('div'); conf.style.position='fixed'; conf.style.width='10px'; conf.style.height='15px'; conf.style.background=`hsl(${Math.random()*360},100%,60%)`; conf.style.left=Math.random()*100+'%'; conf.style.top='50%'; conf.style.borderRadius='2px'; conf.style.zIndex='10001'; conf.style.pointerEvents='none'; conf.style.animation='sparkle 0.8s ease-out forwards'; document.body.appendChild(conf); setTimeout(()=>conf.remove(),800); } }
    function playWinMelody() { try { const ctx = new (window.AudioContext||window.webkitAudioContext)(); const osc=ctx.createOscillator(), gain=ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.frequency.value=523; gain.gain.value=0.3; osc.start(); osc.frequency.exponentialRampToValueAtTime(1047, ctx.currentTime+0.3); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime+0.5); osc.stop(ctx.currentTime+0.5); setTimeout(()=>ctx.close(),600); }catch(e){} }

    function pe_nextWord() {
        if(pe_state.errorTimeout) clearTimeout(pe_state.errorTimeout);
        document.getElementById('pe_winOverlay').style.display = 'none';
        const source = pe_getWordsFromAhorcado();
        let wordObj = source[Math.floor(Math.random() * source.length)];
        pe_state.currentWord = wordObj.w;
        document.getElementById('pe_hint').textContent = wordObj.e;
        pe_state.slots = new Array(pe_state.currentWord.length).fill('');
        pe_state.letters = [...pe_state.currentWord].sort(() => Math.random() - 0.5);
        pe_render();
    }

    function pe_render() {
        let slotsDiv = document.getElementById('pe_wordSlots');
        slotsDiv.innerHTML = '';
        pe_state.slots.forEach((val, i) => {
            let div = document.createElement('div');
            div.className = 'pe-slot' + (val ? ' filled' : '');
            div.textContent = val || '?';
            if(val) div.onclick = () => pe_slotClick(i);
            slotsDiv.appendChild(div);
        });
        let lettersDiv = document.getElementById('pe_lettersArea');
        lettersDiv.innerHTML = '';
        pe_state.letters.forEach((val, idx) => {
            let btn = document.createElement('button');
            btn.className = 'pe-letter-btn';
            btn.textContent = val;
            if(val === null) btn.classList.add('hidden');
            else btn.onclick = () => pe_letterClick(idx);
            lettersDiv.appendChild(btn);
        });
        document.getElementById('pe_score').textContent = gameCore.player.score;
        document.getElementById('pe_level').textContent = gameCore.player.level;
    }

    // ANIMACIÓN DE ERROR: la letra regresa a su lugar (con efecto de rebote)
    function pe_letterClick(idx) {
        let val = pe_state.letters[idx];
        if(!val) return;
        let emptyIdx = pe_state.slots.indexOf('');
        if(emptyIdx !== -1) {
            // animación de movimiento hacia el slot
            pe_state.slots[emptyIdx] = val;
            pe_state.letters[idx] = null;
            pe_render();
            // verificar si es correcta o no
            const expected = pe_state.currentWord[emptyIdx];
            if (expected !== val) {
                // INCORRECTO: la letra debe volver a su lugar después de un breve destello
                const slotDiv = document.querySelectorAll('.pe-slot')[emptyIdx];
                if(slotDiv) slotDiv.classList.add('error-shake');
                // Efecto visual de error
                createMagicSpark(window.event?.clientX || window.innerWidth/2, window.event?.clientY || window.innerHeight/2);
                // revertir cambio después de 500ms
                pe_state.slots[emptyIdx] = '';
                pe_state.letters[idx] = val;
                setTimeout(() => {
                    pe_render();
                    const msgBox = document.getElementById('pe_prizeMsg');
                    msgBox.style.display = 'block';
                    msgBox.textContent = '❌ ' + (gameCore.settings.language === 'es' ? '¡Letra equivocada! Regresa a su lugar' : 'Wrong letter! Returns back');
                    msgBox.style.animation = 'none';
                    msgBox.offsetHeight;
                    msgBox.style.animation = 'glowPulse 0.3s';
                    setTimeout(() => { if(msgBox.style.display !== 'none') msgBox.style.display = 'none'; }, 800);
                }, 400);
                return;
            }
            // CORRECTO
            if(window.ah_playSound) try{new AudioContext()}catch(e){}
            playWinMelody();
            createMagicSpark(window.event?.clientX || innerWidth/2, window.event?.clientY || innerHeight/2);
            pe_checkWin();
        }
    }

    function pe_slotClick(idx) {
        let val = pe_state.slots[idx];
        if(val) {
            let emptyIdx = pe_state.letters.indexOf(null);
            if(emptyIdx !== -1) {
                pe_state.letters[emptyIdx] = val;
                pe_state.slots[idx] = '';
                pe_render();
            }
        }
    }

    function pe_checkWin() {
        if(!pe_state.slots.includes('')) {
            let formed = pe_state.slots.join('');
            if(formed === pe_state.currentWord) {
                const pointsGain = 80 + (gameCore.player.level * 8);
                gameCore.addScore(pointsGain);
                gameCore.registerWordResult(pe_state.currentWord, true);
                // Mostrar premio emotivo
                showPrizeCelebration();
                // Subir de nivel con explosión mágica
                gameCore.player.level++;
                gameCore.saveGame();
                showLevelUpMagic();
                createConfettiExplosion();
                // desbloquear premio si es nivel especial
                if(gameCore.player.level === 3) gameCore.unlockReward('unicornio_plateado');
                if(gameCore.player.level === 5) gameCore.unlockReward('arcoiris_magico');
                if(gameCore.player.level === 7) gameCore.unlockReward('corazon_luminoso');
                pe_updatePrizes();
                pe_renderCollection();
                // Mostrar overlay de victoria mejorado
                const overlay = document.getElementById('pe_winOverlay');
                const prizeMsg = document.getElementById('pe_prizeMsg');
                prizeMsg.style.display = 'block';
                prizeMsg.innerHTML = `🎉✨ ¡+${pointsGain} puntos! ✨🎉<br>¡Desbloqueaste magia nueva!`;
                document.getElementById('pe_winTitle').innerHTML = '🎊 ¡PALABRA MÁGICA COMPLETA! 🎊';
                document.getElementById('pe_winEmoji').innerHTML = '🏆🌈✨';
                overlay.classList.add('win-overlay-premium');
                overlay.style.display = 'block';
                // Confeti extra
                for(let i=0;i<80;i++) createMagicSpark(Math.random()*window.innerWidth, Math.random()*window.innerHeight);
                return;
            }
        }
    }

    function showPrizeCelebration() {
        const prizeDiv = document.createElement('div');
        prizeDiv.className = 'congrats-firework';
        prizeDiv.innerHTML = '<div style="position:absolute; top:30%; left:50%; transform:translate(-50%,-50%); font-size:4rem;">✨🎁 PREMIO BRILLANTE 🎁✨</div>';
        document.body.appendChild(prizeDiv);
        setTimeout(()=>prizeDiv.remove(), 1200);
    }

    function pe_updatePrizes() {
        let list = document.getElementById('pe_prizeList');
        list.innerHTML = '';
        gameCore.player.rewards.forEach(rid => {
            const reward = gameCore.rewardCatalog.find(r => r.id === rid);
            if(reward) {
                let d = document.createElement('div');
                d.className = 'pe-prize-item';
                d.innerHTML = reward.icono + '<span>' + reward.nombre + '</span>';
                d.style.animation = 'glowPulse 0.8s';
                list.appendChild(d);
            }
        });
    }

    function pe_renderCollection() {
        const grid = document.getElementById('pe_collectionGrid');
        grid.innerHTML = '';
        gameCore.rewardCatalog.forEach(reward => {
            const unlocked = gameCore.player.rewards.includes(reward.id);
            const el = document.createElement('div');
            el.className = 'collection-item' + (unlocked ? ' unlocked' : ' locked');
            el.style.background = unlocked ? 'linear-gradient(145deg, gold, #ffda77)' : 'rgba(255,255,255,0.2)';
            el.style.padding = '10px 15px';
            el.style.borderRadius = '40px';
            el.style.display = 'flex';
            el.style.alignItems = 'center';
            el.style.gap = '10px';
            el.style.fontWeight = 'bold';
            el.innerHTML = reward.icono + '<span class="name">' + reward.nombre + '</span>';
            grid.appendChild(el);
        });
    }

    window.pe_nextWord = pe_nextWord;
    window.pe_restartFromLevelOne = pe_restartFromLevelOne;
    window.pe_startGame = pe_startGame;
    window.gc_setLangAndRefresh = gc_setLangAndRefresh;
    window.gc_refreshHeaderLabels = gc_refreshHeaderLabels;

    // Inicialización mágica
    pe_startGame();
    setInterval(() => {
        const active = document.getElementById('palabras-app').style.display === 'block';
        if(active && gameCore.player.level > 0) pe_updatePrizes();
    }, 2000);
</script>
</body>
</html>
