<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking - Juegos Aurora</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B9D;
            --secondary: #C44569;
            --accent1: #FFC312;
            --accent2: #12CBC4;
            --bg: #1a1a2e;
            --card: #16213e;
            --text: #f1f2f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
        }
        .bg-animation {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        .bg-animation .bubble {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            animation: float 15s infinite ease-in-out;
        }
        .bubble:nth-child(1) { width: 80px; height: 80px; background: #FF6B9D; left: 10%; top: 20%; animation-delay: 0s; }
        .bubble:nth-child(2) { width: 120px; height: 120px; background: #12CBC4; left: 70%; top: 60%; animation-delay: 2s; }
        .bubble:nth-child(3) { width: 60px; height: 60px; background: #FFC312; left: 40%; top: 80%; animation-delay: 4s; }
        .bubble:nth-child(4) { width: 100px; height: 100px; background: #6C5CE7; left: 80%; top: 10%; animation-delay: 1s; }
        .bubble:nth-child(5) { width: 70px; height: 70px; background: #00D2D3; left: 20%; top: 70%; animation-delay: 3s; }
        .bubble:nth-child(6) { width: 90px; height: 90px; background: #FF9F43; left: 55%; top: 30%; animation-delay: 5s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33% { transform: translateY(-30px) rotate(120deg); }
            66% { transform: translateY(20px) rotate(240deg); }
        }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .star { position: absolute; width: 3px; height: 3px; background: white; border-radius: 50%; animation: twinkle 2s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
        .container { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 30px 20px; min-height: 100vh; }
        .back-btn { position: fixed; top: 20px; left: 20px; background: linear-gradient(135deg, #6C5CE7, #B53471); color: white; border: none; border-radius: 50px; padding: 10px 20px; font-family: 'Fredoka One', cursive; cursor: pointer; z-index: 100; text-decoration: none; }
        .title { font-family: 'Fredoka One', cursive; font-size: 2.5rem; text-align: center; background: linear-gradient(90deg, var(--primary), var(--accent1), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
        .ranking-card { background: linear-gradient(135deg, var(--card), #1e2a4a); border-radius: 30px; padding: 25px; border: 2px solid rgba(255,255,255,0.1); }
        .ranking-header { display: grid; grid-template-columns: 60px 80px 1fr 100px 80px; padding: 15px; border-bottom: 2px solid rgba(255,255,255,0.1); font-weight: bold; color: var(--accent1); margin-bottom: 10px; }
        .ranking-item { display: grid; grid-template-columns: 60px 80px 1fr 100px 80px; padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); align-items: center; transition: all 0.3s; }
        .ranking-item:hover { background: rgba(255,255,255,0.05); }
        .rank-number { font-family: 'Fredoka One', cursive; font-size: 1.3rem; color: var(--accent1); }
        .rank-avatar { font-size: 2rem; }
        .rank-name { font-weight: bold; }
        .rank-score { font-family: 'Fredoka One', cursive; color: var(--accent2); }
        .rank-level { color: #aaa; }
        .current-user { background: rgba(18,203,196,0.15); border-left: 4px solid var(--accent2); }
        @media (max-width: 700px) {
            .ranking-header, .ranking-item { grid-template-columns: 40px 50px 1fr 70px 60px; font-size: 0.8rem; }
            .rank-avatar { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="bg-animation"><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div></div>
    <div class="stars" id="stars"></div>
    <a href="index.html" class="back-btn">🏠 Volver</a>
    <div class="container">
        <h1 class="title">🏆 Ranking de Aventureros 🏆</h1>
        <div class="ranking-card">
            <div class="ranking-header">
                <div>#</div><div></div><div>Jugador</div><div>Puntos</div><div>Nivel</div>
            </div>
            <div id="rankingList"></div>
        </div>
    </div>
    <script>
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(star);
            }
        }
        createStars();

        function renderRanking() {
            const users = JSON.parse(localStorage.getItem('aurora_users') || '[]');
            users.sort((a, b) => b.stats.totalScore - a.stats.totalScore);
            const currentUserId = localStorage.getItem('aurora_active_user');
            
            const rankingHTML = users.map((user, index) => `
                <div class="ranking-item ${currentUserId === user.id ? 'current-user' : ''}">
                    <div class="rank-number">#${index + 1}</div>
                    <div class="rank-avatar">${user.avatar}</div>
                    <div class="rank-name">${escapeHtml(user.name)}</div>
                    <div class="rank-score">🏆 ${user.stats.totalScore}</div>
                    <div class="rank-level">Nivel ${user.stats.level}</div>
                </div>
            `).join('');
            
            document.getElementById('rankingList').innerHTML = rankingHTML || '<div style="text-align:center;padding:40px;">No hay jugadores aún</div>';
        }
        
        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        renderRanking();
    </script>
</body>
</html>
