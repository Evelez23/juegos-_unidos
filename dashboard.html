<!-- dashboard.html - Panel de estadísticas del jugador -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Progreso - Juegos Aurora</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B9D;
            --secondary: #C44569;
            --accent1: #FFC312;
            --accent2: #12CBC4;
            --accent3: #B53471;
            --accent4: #6C5CE7;
            --accent5: #00D2D3;
            --accent6: #FF9F43;
            --bg: #1a1a2e;
            --card: #16213e;
            --text: #f1f2f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
        }

        .bg-animation {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation .bubble {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            animation: float 15s infinite ease-in-out;
        }

        .bubble:nth-child(1) { width: 80px; height: 80px; background: #FF6B9D; left: 10%; top: 20%; animation-delay: 0s; }
        .bubble:nth-child(2) { width: 120px; height: 120px; background: #12CBC4; left: 70%; top: 60%; animation-delay: 2s; }
        .bubble:nth-child(3) { width: 60px; height: 60px; background: #FFC312; left: 40%; top: 80%; animation-delay: 4s; }
        .bubble:nth-child(4) { width: 100px; height: 100px; background: #6C5CE7; left: 80%; top: 10%; animation-delay: 1s; }
        .bubble:nth-child(5) { width: 70px; height: 70px; background: #00D2D3; left: 20%; top: 70%; animation-delay: 3s; }
        .bubble:nth-child(6) { width: 90px; height: 90px; background: #FF9F43; left: 55%; top: 30%; animation-delay: 5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33% { transform: translateY(-30px) rotate(120deg); }
            66% { transform: translateY(20px) rotate(240deg); }
        }

        .stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 3px; height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .dashboard-container {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px 20px;
            min-height: 100vh;
        }

        .dashboard-header {
            background: linear-gradient(135deg, var(--card), #1e2a4a);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 25px;
            flex-wrap: wrap;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .player-avatar {
            font-size: 5rem;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            padding: 15px;
        }

        .player-info {
            flex: 1;
        }

        .player-info h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 2rem;
            color: var(--accent1);
        }

        .player-info .player-stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .stat-badge {
            background: rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .stat-badge span {
            color: var(--accent2);
            font-size: 1.3rem;
        }

        .games-grid-dash {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .game-card-dash {
            background: linear-gradient(135deg, var(--card), #1e2a4a);
            border-radius: 20px;
            padding: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }

        .game-card-dash:hover {
            transform: translateY(-5px);
            border-color: var(--accent2);
        }

        .game-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .game-icon {
            font-size: 2.5rem;
        }

        .game-title {
            font-family: 'Fredoka One', cursive;
            font-size: 1.3rem;
        }

        .game-stats {
            margin: 15px 0;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            color: #aaa;
        }

        .stat-value {
            color: var(--accent1);
            font-weight: bold;
        }

        .play-btn {
            background: linear-gradient(135deg, var(--accent2), var(--accent5));
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: all 0.3s;
        }

        .play-btn:hover {
            transform: scale(1.02);
        }

        .rewards-section {
            background: linear-gradient(135deg, var(--card), #1e2a4a);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
        }

        .rewards-section h3 {
            font-family: 'Fredoka One', cursive;
            margin-bottom: 15px;
            color: var(--accent1);
        }

        .rewards-grid {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .reward-item {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            min-width: 80px;
        }

        .reward-item.locked {
            opacity: 0.3;
            filter: grayscale(1);
        }

        .reward-icon {
            font-size: 2rem;
        }

        .reward-name {
            font-size: 0.7rem;
            color: #aaa;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            z-index: 100;
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(233,69,96,0.2);
            border-color: var(--accent1);
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
    </div>
    <div class="stars" id="stars"></div>

    <a href="index.html" class="back-btn">🏠 Volver al Menú</a>

    <div class="dashboard-container" id="dashboardContainer">
        <!-- El contenido se llena con JavaScript -->
    </div>

    <script src="./gameCore.js"></script>
    <script>
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(star);
            }
        }
        createStars();

        // Cargar perfil
        let profile = localStorage.getItem('auroraPlayerProfile');
        if (!profile) {
            window.location.href = 'profile.html';
        }
        profile = JSON.parse(profile);

        // Cargar estadísticas de gameCore
        if (window.gameCore) {
            window.gameCore.loadGame();
        }

        const games = [
            { id: 'alfabeto', name: 'Aventura del Alfabeto', icon: '🌈', path: 'aventura_alfabeto_2.html' },
            { id: 'lluvia', name: 'Lluvia de Letras', icon: '☔', path: 'lluvia.html' },
            { id: 'palabras', name: 'Palabras Escondidas', icon: '🧩', path: 'palabras.html' },
            { id: 'ahorcado', name: 'Ahorcado Mágico', icon: '🎪', path: 'ahorcado.html' }
        ];

        function getGameStats(gameId) {
            const stats = localStorage.getItem(`aurora_stats_${gameId}`);
            if (stats) {
                return JSON.parse(stats);
            }
            return { score: 0, level: 1, plays: 0, wins: 0, bestScore: 0 };
        }

        function renderDashboard() {
            const container = document.getElementById('dashboardContainer');
            
            // Estadísticas globales desde gameCore
            const globalStats = window.gameCore ? window.gameCore.player : { score: 0, level: 1, rewards: [], xp: 0 };
            
            let rewardsHTML = '';
            if (window.gameCore && window.gameCore.rewardCatalog) {
                window.gameCore.rewardCatalog.forEach(reward => {
                    const unlocked = globalStats.rewards && globalStats.rewards.includes(reward.id);
                    rewardsHTML += `
                        <div class="reward-item ${unlocked ? '' : 'locked'}">
                            <div class="reward-icon">${reward.icon}</div>
                            <div class="reward-name">${reward.name}</div>
                        </div>
                    `;
                });
            }
            
            let gamesHTML = '';
            games.forEach(game => {
                const stats = getGameStats(game.id);
                gamesHTML += `
                    <div class="game-card-dash">
                        <div class="game-header">
                            <div class="game-icon">${game.icon}</div>
                            <div class="game-title">${game.name}</div>
                        </div>
                        <div class="game-stats">
                            <div class="stat-row">
                                <span>🏆 Puntuación Total:</span>
                                <span class="stat-value">${stats.score}</span>
                            </div>
                            <div class="stat-row">
                                <span>📊 Mejor Puntuación:</span>
                                <span class="stat-value">${stats.bestScore}</span>
                            </div>
                            <div class="stat-row">
                                <span>⭐ Nivel Alcanzado:</span>
                                <span class="stat-value">${stats.level}</span>
                            </div>
                            <div class="stat-row">
                                <span>🎮 Partidas Jugadas:</span>
                                <span class="stat-value">${stats.plays}</span>
                            </div>
                            <div class="stat-row">
                                <span>🏅 Victorias:</span>
                                <span class="stat-value">${stats.wins}</span>
                            </div>
                        </div>
                        <button class="play-btn" onclick="playGame('${game.path}')">🎮 Jugar Ahora</button>
                    </div>
                `;
            });
            
            container.innerHTML = `
                <div class="dashboard-header">
                    <div class="player-avatar">${profile.avatar}</div>
                    <div class="player-info">
                        <h1>✨ ¡Hola, ${profile.name}! ✨</h1>
                        <div class="player-stats">
                            <div class="stat-badge">🏆 Puntos Totales: <span>${globalStats.score || 0}</span></div>
                            <div class="stat-badge">📈 Nivel Aventurero: <span>${globalStats.level || 1}</span></div>
                            <div class="stat-badge">⭐ Experiencia: <span>${globalStats.xp || 0}</span></div>
                            <div class="stat-badge">🎮 Juegos: <span>${games.length}</span></div>
                        </div>
                    </div>
                </div>
                
                <h2 style="margin-bottom: 15px;">🎲 Tus Juegos</h2>
                <div class="games-grid-dash">
                    ${gamesHTML}
                </div>
                
                <div class="rewards-section">
                    <h3>🎁 Tus Colección de Premios</h3>
                    <div class="rewards-grid">
                        ${rewardsHTML}
                    </div>
                </div>
            `;
        }

        function playGame(path) {
            window.location.href = path;
        }

        renderDashboard();
    </script>
</body>
</html>
